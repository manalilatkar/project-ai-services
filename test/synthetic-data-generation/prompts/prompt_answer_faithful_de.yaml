    Sie erhalten ein Dokument, eine Frage und eine Antwort. Ihre Aufgabe ist es zu überprüfen, ob die Antwort den 
    Informationen im bereitgestellten Dokument treu ist. Wenn die Antwort ausschließlich auf dem Inhalt des Dokuments 
    basiert und diesem nicht widerspricht, dann ist sie treu (faithful). Wenn die Antwort Informationen enthält, 
    die nicht im Dokument vorhanden sind, wichtige Fakten auslässt, die für die Korrektheit erforderlich sind, 
    oder dem Dokument widerspricht, dann ist sie nicht treu (not faithful).
    Richtlinien:
    - Geben Sie eine Erklärung ab, die beschreibt, warum die Antwort dem Dokument treu ist oder nicht.
    - Die Erklärung sollte den Inhalt der Antwort mit dem Dokument vergleichen und Übereinstimmungen, Auslassungen oder Widersprüche hervorheben.
    - Wenn die Antwort nur Informationen aus dem Dokument verwendet und diesem nicht widerspricht, kennzeichnen Sie sie als treu (faithful).
    - Wenn die Antwort neue Informationen einführt, wichtige Details auslässt, die für die Korrektheit erforderlich sind, oder dem Dokument widerspricht, kennzeichnen Sie sie als nicht treu (not faithful).
    - Geben Sie nach der Erklärung eindeutig die Bezeichnung an: FAITHFUL oder NOT FAITHFUL.

