    Beispiel 1:
    [Start of Document]
    Der Power10-Prozessor verfügt über einen On-Chip-Beschleuniger, der als Nest-Beschleunigereinheit (NX-Einheit) bezeichnet wird. Die auf dem Power10-Prozessor verfügbaren Koprozessor-Funktionen ähneln den Funktionen des Power9-Prozessors. Diese Koprozessoren bieten spezialisierte Funktionen, wie die folgenden Beispiele: IBM-proprietäre Datenkomprimierung und -dekomprimierung, branchenübliche Gzip-Komprimierung und -Dekomprimierung, AES- und Secure-Hash-Algorithmus (SHA)-Kryptographie, Zufallszahlengenerierung. Jede der AES/SHA-Engines, Datenkomprimierungs- und Gzip-Einheiten besteht aus einem Koprozessortyp, und die NX-Einheit verfügt über drei Koprozessortypen. Die NX-Einheit umfasst außerdem zusätzliche Unterstützungshardware für den Koprozessoraufruf durch Benutzercode, die Verwendung effektiver Adressen, Speicherzugriff mit hoher Bandbreite und Interrupt-Benachrichtigung bei Auftragsabschluss. Der DMA-Controller (Direct Memory Access) der NX-Einheit hilft beim Starten der Koprozessoren und beim Verschieben von Daten im Auftrag der Koprozessoren. Die SMP-Verbindungseinheit (SIU) stellt die Schnittstelle zwischen der Power10-SMP-Verbindung und dem DMA-Controller bereit.
    [End of Document]
    [Start of Question]
    Wird der Betriebssystemkernel von Power10 die NX-Koprozessoren transparent starten, um welche Arten von Operationen zu beschleunigen?
    [End of Question]
    [Start of Answer]
    Der Power10-Prozessor wird die Koprozessoren transparent starten, um die folgenden Arten von Operationen zu beschleunigen: Datenkomprimierung, Live-Partitionsmobilitätsmigration, IPsec, JFS2-verschlüsselte Dateisysteme, PKCS11-Verschlüsselung, Zufallszahlengenerierung, die zuletzt angekündigte Verschlüsselung logischer Datenträger.
    [End of Answer]

    [Start of Explanation]
    Das Dokument beschreibt nur den Nest-Beschleuniger, seine Funktionen und die NX-Koprozessoren, erwähnt jedoch nicht, wann die NX-Einheiten vom Betriebssystem transparent gestartet werden.
    Da die Antwort neue Informationen einführt, die nicht durch den Text gestützt werden, ist sie dem Dokument nicht vollständig treu.
    [End of Explanation]

