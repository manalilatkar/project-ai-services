    Beispiel 1:
    [Start of Document]
    Kapitel: Architektur und technischer Überblick Unterabschnitt: On-Chip-L3-Cache und intelligentes Caching \n\uf0b7 Der Power10-Prozessor verfügt über einen großen On-Chip-L3-Cache von bis zu 120 MB mit einer NUCA-Architektur, die Mechanismen zur Verteilung und gemeinsamen Nutzung von Cache-Speicherbereichen über eine Reihe von L3-Cache-Regionen bereitstellt. Jeder Prozessorkern kann auf einen zugehörigen lokalen 8-MB-L3-Cache zugreifen. Er kann auch auf die Daten in den anderen L3-Cache-Regionen auf dem Chip und im gesamten System zugreifen. Jede L3-Region dient als Victim-Cache für den zugehörigen L2-Cache und kann aggregierten Speicher für den On-Chip-Cache-Speicherbedarf bereitstellen. Durch intelligentes L3-Cache-Management kann der Power10-Prozessor den Zugriff auf L3-Cache-Zeilen optimieren und Cache-Latenzen minimieren. Der L3-Cache enthält einen Ersetzungsalgorithmus mit Datentyp- und Wiederverwendungserkennung. Er unterstützt außerdem eine Vielzahl von Prefetch-Anforderungen vom Kern, einschließlich Befehls- und Daten-Prefetch, und arbeitet kooperativ mit dem Kern, dem Speichercontroller und dem SMP-Verbindungsnetzwerk zusammen, um den Prefetch-Datenverkehr zu verwalten, wodurch der Systemdurchsatz und die Datenlatenz optimiert werden.
    [End of Document]
    [Start of Question]
    Welche Art von Caching-Mechanismus hat der Power10-Prozessor?
    [End of Question]
