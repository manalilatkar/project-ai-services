apiVersion: v1
kind: Service
metadata:
  name: "similarity-api"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  selector:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/component: similarity-api
  ports:
    - name: similarity-api
      port: 7000
      targetPort: 7000
      protocol: TCP
